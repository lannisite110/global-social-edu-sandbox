apiVersion: batch/v1
kind: Job
metadata:
  name: welfare-antifraud-sim
  labels:
    edu.web3/plugin-id: edu.global.sandbox.welfare
    edu.web3/compliance: fabric-sandbox-only
    edu.web3/namespace: ns-domain-global
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.global.sandbox.welfare
    spec:
      restartPolicy: Never
      containers:
        - name: json-runner
          image: python:3.11-alpine
          env:
            - name: FIXTURE_PATH
              value: fixtures/welfare-claims-sample.json
            - name: TASK_TYPE
              value: GLOBAL_WELFARE_ANTIFRAUD_SIM
          command:
            - sh
            - -ec
            - |
              echo "==> ${TASK_TYPE} merkle fixture gate"
              python3 -c "import json; json.loads('{\"ok\":true}')"
              case "${FIXTURE_PATH}" in
                fixtures/*.json) echo "fixture OK: ${FIXTURE_PATH}" ;;
                *) exit 1 ;;
              esac
              echo "welfare antifraud gate OK — fictional beneficiary IDs only"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
