apiVersion: batch/v1
kind: Job
metadata:
  name: religion-rule-sandbox
  labels:
    edu.web3/plugin-id: edu.global.sandbox.religion
    edu.web3/compliance: fabric-sandbox-only
    edu.web3/namespace: ns-domain-global
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.global.sandbox.religion
    spec:
      restartPolicy: Never
      containers:
        - name: yaml-runner
          image: python:3.11-alpine
          env:
            - name: FIXTURE_PATH
              value: fixtures/zakat-rules-sample.yaml
            - name: TASK_TYPE
              value: GLOBAL_RELIGION_RULE_SANDBOX
          command:
            - sh
            - -ec
            - |
              echo "==> ${TASK_TYPE} yaml fixture gate"
              python3 -c "print('python gate OK')"
              case "${FIXTURE_PATH}" in
                fixtures/*.yaml) echo "fixture OK: ${FIXTURE_PATH}" ;;
                *) exit 1 ;;
              esac
              echo "religion rule sandbox gate OK — static expression only"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
