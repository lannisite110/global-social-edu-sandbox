apiVersion: edu.web3/v1
kind: PluginPackage
metadata:
  id: edu.global.sandbox.religion
  name: Religion Rule Sandbox
  version: 0.2.0
  repo: global-social-edu-sandbox
  compliance_tier: global_sandbox

spec:
  coreVersion: ">=0.6.0 <2.0.0"
  taskTypes:
    - GLOBAL_RELIGION_RULE_SANDBOX
  namespaces:
    - ns-domain-global
  allowedChainIds:
    - fabric-local
  frontend:
    routePrefix: /labs/edu.global.sandbox.religion
    entry: plugins/frontend/religion/plugin.ts
  rules:
    entry: plugins.rules.religion:evaluate
  k8s:
    jobTemplate: k8s/overlays/ns-domain-global/religion-job.yaml
  docs:
    - docs/tutorials/religion-rules-intro.md
