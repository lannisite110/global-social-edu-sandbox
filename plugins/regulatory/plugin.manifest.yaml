apiVersion: edu.web3/v1
kind: PluginPackage
metadata:
  id: edu.global.sandbox.regulatory
  name: Regulatory Rule Sandbox
  version: 0.2.0
  repo: global-social-edu-sandbox
  compliance_tier: global_sandbox

spec:
  coreVersion: ">=0.3.0 <0.4.0"
  taskTypes:
    - GLOBAL_REGULATORY_RULE_SANDBOX
  namespaces:
    - ns-domain-global
  allowedChainIds:
    - fabric-local
  frontend:
    routePrefix: /labs/edu.global.sandbox.regulatory
    entry: plugins/frontend/regulatory/plugin.ts
  rules:
    entry: plugins.rules.regulatory:evaluate
  k8s:
    jobTemplate: k8s/overlays/ns-domain-global/regulatory-job.yaml
  docs:
    - docs/tutorials/regulatory-sandbox-intro.md
