apiVersion: edu.web3/v1
kind: PluginPackage
metadata:
  id: edu.global.sandbox.election
  name: Election Hash Consensus Demo
  version: 0.2.0
  repo: global-social-edu-sandbox
  compliance_tier: global_sandbox

spec:
  coreVersion: ">=0.6.0 <2.0.0"
  taskTypes:
    - GLOBAL_ELECTION_HASH_DEMO
  namespaces:
    - ns-domain-global
  allowedChainIds:
    - fabric-local
  frontend:
    routePrefix: /labs/edu.global.sandbox.election
    entry: plugins/frontend/election/plugin.ts
  rules:
    entry: plugins.rules.election:evaluate
  k8s:
    jobTemplate: k8s/overlays/ns-domain-global/election-job.yaml
  docs:
    - docs/tutorials/election-hash-intro.md
