apiVersion: edu.web3/v1
kind: PluginPackage
metadata:
  id: edu.global.sandbox.logistics
  name: Logistics Audit Ledger Demo
  version: 0.4.0
  repo: global-social-edu-sandbox
  compliance_tier: global_sandbox

spec:
  coreVersion: ">=0.6.0 <2.0.0"
  taskTypes:
    - GLOBAL_LOGISTICS_AUDIT_DEMO
  namespaces:
    - ns-domain-global
  allowedChainIds:
    - fabric-local
  frontend:
    routePrefix: /labs/edu.global.sandbox.logistics
    entry: plugins/frontend/logistics/plugin.ts
  rules:
    entry: plugins.rules.logistics:evaluate
  k8s:
    jobTemplate: k8s/overlays/ns-domain-global/logistics-job.yaml
  docs:
    - docs/tutorials/logistics-audit-intro.md
